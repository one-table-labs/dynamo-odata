name: Bug report
description: Report a reproducible problem
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please keep this issue vendor-neutral. Avoid product/customer names and
        internal project-specific data unless it is strictly required.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Short description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 0.1.0
  - type: checkboxes
    id: neutrality
    attributes:
      label: Open-source neutrality
      options:
        - label: I removed product/customer/internal project names unless required
          required: true
        - label: I used generic examples and no project-specific datasets/identifiers
          required: true
